BASE_URL: https://hackapizza.datapizza.tech
REGOLO_BASE_URL: https://api.regolo.ai/v1
REGOLO_MODEL_BIG: gpt-oss-120b
REGOLO_MODEL_SMALL: gpt-oss-20b

# Bidding strategy
DEFAULT_BID_FLAT: 4        # flat bid per ingredient on turn 1
DEFAULT_BID_QUANTITY: 18
DEFAULT_PRICE_SELL: 180
DEFAULT_PRICE_SELL_MARKET: 50
BID_CLEARING_MULTIPLIER: 1.1  # bid = clearing_price * multiplier
MAX_BID_BALANCE_FRACTION: 0.6  # cap: max 60% of balance in bids
BID_SERVINGS_MULTIPLIER: 2

MAX_RECIPES: 35

MIN_DISH_TO_FULFILL_OR_CLOSE_FRACTION: 0.3 # Lower bound of fraction of dish to be able to fulfill before closing

# Market strategy
MARKET_MAX_BUY_MULTIPLIER: 0.8  # only buy if price <= clearing_price * this (buy cheap!)
MARKET_MAX_BUY_FLAT: 3         # max price per unit when no clearing price known

# Menu pricing
MENU_MARKUP: 2.5            # dish price = ingredient cost * markup